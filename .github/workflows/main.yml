name: Release and Deploy

on:
  push:
    tags:
      - 'v*' # v로 시작하는 모든 태그에서 트리거

permissions:
  contents: write  # 릴리즈 생성 권한을 명시적으로 추가
  id-token: write   # id-token 사용 권한 추가 (필요한 경우)
  
jobs:
  release-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 코드 체크아웃
    - name: Checkout Code
      uses: actions/checkout@v3

    # 4. EC2에 배포
    - name: Create PEM file
      run: echo "${{ secrets.EC2_PRIVATE_KEY }}" > private_key.pem

    - name: Set PEM file permissions
      run: chmod 600 private_key.pem

    - name: Deploy to EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          curl -L -o build.zip https://github.com/oyc0401/rokafmail/releases/download/${{ github.ref_name }}/build.zip
          
          cd /home/ubuntu/rokafmail
          git reset --hard

          # 원격 저장소에서 최신 코드를 가져옵니다
          git pull origin main

          # .next 폴더를 업데이트합니다
          unzip -o build.zip ".next/*" -d /home/ubuntu/rokafmail

          # 필요한 의존성을 설치합니다
          npm install --production

          # 애플리케이션을 PM2로 재시작합니다
          pm2 restart all
        EOF
        
    - name: Clean Up
      run: rm private_key.pem
