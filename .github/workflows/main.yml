name: Release and Deploy

on:
  push:
    tags:
      - 'v*' # v로 시작하는 모든 태그에서 트리거

permissions:
  contents: write  # 릴리즈 생성 권한을 명시적으로 추가
  id-token: write   # id-token 사용 권한 추가 (필요한 경우)
  
jobs:
  release-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 코드 체크아웃
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Node.js 설치 및 빌드
    - name: Install dependencies and build
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Build Project
      run: |
        npm ci
        npm run build
        zip -r build.zip .next

    # 3. GitHub Release 생성
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: build.zip
        name: "Release ${{ github.ref_name }}" # 릴리즈 이름에 태그 포함
        tag_name: ${{ github.ref_name }} # 태그 이름
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 4. EC2에 배포
    - name: Upload build.zip to EC2
      run: |
        scp -o StrictHostKeyChecking=no -i ${{ secrets.EC2_PRIVATE_KEY }} build.zip ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/
    - name: Deploy to EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i ${{ secrets.EC2_PRIVATE_KEY }} ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          cd /home/ubuntu/rokafmail
          git reset --hard

          # 원격 저장소에서 최신 코드를 가져옵니다
          git pull origin main

          # .next 폴더를 업데이트합니다
          unzip -o /home/ubuntu/build.zip ".next/*" -d /home/ubuntu/rokafmail

          # 필요한 의존성을 설치합니다
          npm install --production

          # 애플리케이션을 PM2로 재시작합니다
          pm2 restart all
        EOF
