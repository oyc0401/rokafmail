name: Release and Deploy

on:
  push:
    tags:
      - 'v*' # v로 시작하는 모든 태그에서 트리거

permissions:
  contents: write  # 릴리즈 생성 권한을 명시적으로 추가
  id-token: write   # id-token 사용 권한 추가 (필요한 경우)
  
jobs:
  release-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 코드 체크아웃
    - name: Checkout Code
      uses: actions/checkout@v3


    # 4. EC2에서 파일 다운로드
    - name: Create PEM file
      run: echo "${{ secrets.EC2_PRIVATE_KEY }}" > private_key.pem

    - name: Set PEM file permissions
      run: chmod 600 private_key.pem
      
    - name: Upload build.zip to EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.EC2_HOST }} << EOF
          cd /home/ubuntu
          rm build.zip
          gh release download ${{ github.ref_name }} --repo oyc0401/rokafmail --pattern "build.zip"
        EOF

    # 5. build.zip을 기반으로 실행
    - name: Run Project
      run: |
        ssh -t -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          source ~/.bashrc # 대화형 환경 설정 파일 로드
          bash /home/ubuntu/deploy.sh
        EOF

