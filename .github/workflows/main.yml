name: Release and Deploy

on:
  push:
    tags:
      - 'v*' # v로 시작하는 모든 태그에서 트리거

jobs:
  release-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 코드 체크아웃
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Node.js 설치 및 빌드
    - name: Install dependencies and build
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Build Project
      run: |
        npm ci
        npm run build
        zip -r build.zip .next

    # 3. GitHub Release 생성
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: build.zip
        name: "Release ${{ github.ref_name }}" # 릴리즈 이름에 태그 포함
        tag_name: ${{ github.ref_name }} # 태그 이름
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
