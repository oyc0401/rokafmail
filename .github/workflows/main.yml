name: Release and Deploy

on:
  push:
    tags:
      - 'v*' # v로 시작하는 모든 태그에서 트리거

permissions:
  contents: write  # 릴리즈 생성 권한을 명시적으로 추가
  id-token: write   # id-token 사용 권한 추가 (필요한 경우)
  
jobs:
  release-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 코드 체크아웃
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Node.js 설치 및 빌드
    - name: Install dependencies and build
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Build Project
      run: |
        npm ci
        npm run build
        zip -r build.zip .next

    # 3. GitHub Release 생성
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: build.zip
        name: "Release ${{ github.ref_name }}" # 릴리즈 이름에 태그 포함
        tag_name: ${{ github.ref_name }} # 태그 이름
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


   # 4. EC2에서 파일 다운로드
    - name: Create PEM file
      run: echo "${{ secrets.EC2_PRIVATE_KEY }}" > private_key.pem

    - name: Set PEM file permissions
      run: chmod 600 private_key.pem

    - name: Upload build.zip on EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.EC2_HOST }} << EOF
          cd /home/ubuntu

          # build.zip이 있으면 삭제
          if [ -f build.zip ]; then
            rm build.zip
          fi
        
          gh release download ${{ github.ref_name }} --repo oyc0401/rokafmail --pattern "build.zip"
        EOF

    # 5. build.zip을 기반으로 실행
    - name: Run Project
      run: |
        ssh -t -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          bash --login /home/ubuntu/deploy.sh
        EOF

    - name: Clean Up Private key
      run: rm private_key.pem
